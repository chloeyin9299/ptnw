    let idx=0; const total=questions.length; let ans=new Array(total).fill(null);

    const prev=document.getElementById('prevBtn'), next=document.getElementById('nextBtn');
    const counter=document.getElementById('counterText'), prog=document.getElementById('progressFill');
    const start=document.getElementById('startTestBtn'), restart=document.getElementById('restartBtn');
    const cName=document.getElementById('charName'), cTitle=document.getElementById('charTitle'), cTags=document.getElementById('traitTags');
    const cQuote=document.getElementById('charQuote'), deep=document.getElementById('deepAnalysis'), rev=document.getElementById('revelation');

    function renderQuestion(i){
      const q=questions[i]; qDisp.textContent=q.text;
      let html=''; q.opts.forEach((opt,oi)=>{ const sel=ans[i]===oi; html+=`<button class="option-btn" data-opt="${oi}" style="${sel?'background:#4a2020;border-color:#d07070;':''}">${opt.text}</button>`; });
      optDiv.innerHTML=html;
      optDiv.querySelectorAll('.option-btn').forEach(b=>b.addEventListener('click',e=>{
        const oi=parseInt(b.dataset.opt); ans[i]=oi;
        optDiv.querySelectorAll('.option-btn').forEach((bt,ix)=>{ bt.style.background=ix===oi?'#4a2020':'#1c0e0ee0'; bt.style.borderColor=ix===oi?'#d07070':'#a85050'; });
        updateNav(i);
      }));
      updateNav(i);
    }
    function updateNav(i){ counter.textContent=`${i+1} / ${total}`; prog.style.width=`${(i+1)/total*100}%`; prev.disabled=i===0; next.textContent=i===total-1?'🔮 揭示烙印':'下一题 →'; }
    
    function calcScores(){
      let scores={}; characters.forEach(c=>scores[c.id]=0);
      ans.forEach((a,i)=>{ if(a!==null){ const sc=questions[i].opts[a].scores; Object.keys(sc).forEach(id=>{ scores[id]=(scores[id]||0)+sc[id]; }); } });
      return scores;
    }
    
    function showResult(){
      const scores=calcScores(); let bestChar=characters[0], maxScore=-999;
      characters.forEach(c=>{ if(scores[c.id]>maxScore){ maxScore=scores[c.id]; bestChar=c; } });
      cName.textContent=bestChar.name; cTitle.textContent=bestChar.title; cQuote.textContent=bestChar.quote;
      deep.textContent=bestChar.analysis; rev.textContent=bestChar.revelation;
      cTags.innerHTML=''; bestChar.tags.forEach(t=>{ const s=document.createElement('span'); s.className='tag'; s.textContent=t; cTags.appendChild(s); });
      quiz.classList.add('hidden'); res.classList.remove('hidden');
    }
    
    start.addEventListener('click', ()=>{ splash.classList.add('hidden'); quiz.classList.remove('hidden'); renderQuestion(0); });
    prev.addEventListener('click', ()=>{ if(idx>0){ idx--; renderQuestion(idx); } });

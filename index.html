    .stamp-sub { color: #b07070; letter-spacing: 6px; margin-top: 8px; }
    .btn-start { background: #1f0606; border: 3px solid #c05050; color: #f0c0c0; padding: 18px 56px; font-size: 1.8rem; font-weight: 900; border-radius: 60px; cursor: pointer; box-shadow: 0 10px 0 #140101, 0 0 35px #b02020; transition: 0.12s; letter-spacing: 8px; margin-top: 24px; text-transform: uppercase; font-family: 'Cinzel', serif; }

    .btn-start:active { transform: translateY(6px); box-shadow: 0 4px 0 #140101, 0 0 25px #a03030; }
    .splash-footer { margin-top: 40px; color: #a06060; letter-spacing: 2px; border-top: 1px solid #602a2a; padding-top: 20px; width: 80%; text-align: center; }
    .progress-area { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .progress-track { flex: 1; height: 8px; background: #1f0e0e; border-radius: 20px; box-shadow: inset 0 1px 5px #000; }
    .progress-fill { width: 0%; height: 8px; background: linear-gradient(90deg, #c04040, #e09090, #c04040); border-radius: 20px; box-shadow: 0 0 12px #c04040; transition: width 0.2s; }
    .question-counter { font-weight: 600; color: #e0c0c0; min-width: 80px; }

    .question-text { font-size: 1.5rem; font-weight: 600; margin-bottom: 30px; color: #f0d0d0; }
    .options { display: flex; flex-direction: column; gap: 12px; }
    .option-btn { background: #1c0e0ee0; border: 2px solid #a85050; border-radius: 60px; padding: 16px 22px; font-size: 1rem; color: #efd0d0; text-align: left; cursor: pointer; transition: all 0.15s; box-shadow: 0 4px 0 #100404; line-height: 1.4; }
    .option-btn:hover { background: #3a1818; border-color: #d07070; transform: translateY(-2px); box-shadow: 0 6px 0 #100404; }
    .nav-buttons { display: flex; gap: 16px; margin-top: 10px; }
    .btn { background: #1f0c0c; border: 1px solid #b05050; color: #f0d0d0; padding: 16px 24px; font-weight: bold; border-radius: 40px; cursor: pointer; box-shadow: 0 5px 0 #140606; flex: 1; text-align: center; font-size: 1.1rem; }
    .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #140606; }
    .btn:disabled { opacity: 0.3; pointer-events: none; }
    .result-panel { background: #120909f2; border-radius: 36px; padding: 28px 22px; border: 2px solid #c05050; box-shadow: inset 0 0 15px #000, 0 15px 25px #000; }
    .character-name { font-size: 3rem; text-align: center; color: #f0b0b0; text-shadow: 0 0 20px #c04040; }

    .trait-tags { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0; }
    .tag { background: #281818; padding: 6px 20px; border-radius: 30px; border: 1px solid #c06060; color: #f0c0c0; font-weight: 600; }
    .analysis-block { background: #0f0707f0; border-radius: 28px; padding: 22px; margin: 22px 0; border-left: 8px solid #c04040; }

    .restart-btn { background: #1f0a0a; border: 2px solid #c07070; color: #f0d0d0; padding: 16px; width: 100%; font-size: 1.2rem; border-radius: 60px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 6px 0 #140606; }
    .hidden { display: none !important; }
    .footer-note { text-align: center; margin-top: 24px; color: #a07070; letter-spacing: 2px; }
    @media (max-width: 480px) { .test-container { padding: 16px; } h1 { font-size: 1.8rem; } .splash-title { font-size: 2.2rem; } }
  </style>
</head>
<body>
<div class="test-container">
  <h1>MBCC·机密</h1>
  <div class="subhead">—— 收容凶恶之人 · 支配禁忌之力 ——</div>

  <div id="splashScreen">
    <div class="archive-badge"><span class="badge-line"></span><span class="badge-text"></span><span class="badge-line"></span></div>
    <div class="splash-title">无期迷途</div>
    <div class="splash-sub">狂厄烙印 · 人格测试</div>
    <div class="archive-stamp"><div class="stamp-text">VOL.1</div><div class="stamp-sub">MBCC 档案室</div></div>
    <div style="font-size: 1rem; color: #c08080; margin: 10px 0; letter-spacing: 4px;">机密档案 · 禁闭者人格测试</div>
    <button class="btn-start" id="startTestBtn">启封</button>
    <div class="splash-footer">狂厄之下 · 真实永存</div>
  </div>

  <div id="quizSection" class="hidden">
    <div class="progress-area"><div class="progress-track"><div id="progressFill" class="progress-fill" style="width:3.33%"></div></div><div class="question-counter" id="counterText">1 / 30</div></div>
    <div class="question-card"><div class="question-text" id="questionDisplay"></div><div class="options" id="optionsContainer"></div></div>
    <div class="nav-buttons"><button class="btn" id="prevBtn" disabled>← 上一题</button><button class="btn" id="nextBtn">下一题 →</button></div>
  </div>

  <div id="resultSection" class="result-panel hidden">
    <div class="character-name" id="charName"></div><div class="character-title" id="charTitle"></div>
    <div class="trait-tags" id="traitTags"></div>
    <div class="analysis-block"><div class="analysis-title">📜 禁闭者语录</div><div class="quote" id="charQuote"></div></div>
    <div class="analysis-block"><div class="analysis-title">🧬 人格底色 · 行动策略</div><div id="deepAnalysis"></div></div>
    <div class="analysis-block"><div class="analysis-title">🔮 人格注脚</div><div id="revelation"></div></div>
    <button class="restart-btn" id="restartBtn">⟳ 重新烙印</button>
  </div>
  <div class="footer-note">SHACKLE · RESONANCE</div>
</div>

<script>
(function(){
    var characters = [
      { id:'serin', name:'瑟琳', title:'清理人', quote:'在你被命运拖垮之前，我想多看你一眼。', tags:['#掌控','#宿命','#完美'], region:'dis',
        analysis:'人格底色：表面温和完美，内里冷静掌控，带有宿命论的疏离。行动策略：以弥补过失的方式介入，在终点前守护。',
        revelation:'你擅长洞察秩序下的暗流，习惯于在终点到来前做好一切准备。你对代价的计算精准，却也容易被这份清醒所困。偶尔，不妨相信不完美也能被接纳。' },
      { id:'lanjiu', name:'蓝鹫', title:'边境蛇头', quote:'梦想明码标价，铃声是现实击溃梦想的声音。', tags:['#情报','#交易','#悲观'], region:'dis',
        analysis:'人格底色：根植悲观，相信悲剧终将发生。行动策略：在可控范围提供庇护，一切皆视为交易。',
        revelation:'你的务实让你在乱世中生存下来，每一笔交易都算得清楚。但请记得，有些东西无法用价码衡量。偶尔允许自己相信一次例外，或许会有不同的风景。' },
      { id:'000', name:'000', title:'代码幽灵', quote:'就算命运给你牵了别的红线，我也会全部抢过来。', tags:['#高维','#恶趣味','#跳脱'], region:'dis',
        analysis:'人格底色：来自高维的数据产物，知道所有人的结局。行动策略：因局长而产生兴趣，用跳脱的方式参与这个世界。',
        revelation:'你看透了所有的剧本，却仍然选择走进这个故事。这份好奇心让你比任何人都鲜活。你的恶趣味是连接世界的桥梁，冰淇淋和玩笑里藏着真实的温度。' },
      { id:'angel', name:'安吉尔', title:'暗网杀手', quote:'深渊有我就够了，谁也别想把你拖进来。', tags:['#专业','#疏离','#守护'], region:'dis',
        analysis:'人格底色：接受黑暗边缘，孤单即安全。行动策略：接单只看性价比，唯独守护局长。',
        revelation:'你习惯了独来独往，把孤独当作护甲。但在你划定的安全区里，其实一直留着一盏灯。那个人值得你破例，也值得你信任。' },
      { id:'zoya', name:'卓娅', title:'军团首领', quote:'你是我见过最强大的人，以后很多事就交给你了。', tags:['#领袖','#武力','#意志'], region:'dis',
        analysis:'人格底色：信奉暴力终结暴力，靠拳头和意志。行动策略：以绝对力量建立秩序，视部下为战友。',
        revelation:'你的强大毋庸置疑，但真正的力量也包含了信任与托付。你把后背交给战友的那一刻，比任何一次胜利都更有光芒。' },
      { id:'langley', name:'兰利', title:'第九机关', quote:'不要向我索取真实，有些真相只能用性命交换。', tags:['#谋略','#忠诚','#守护'], region:'dis',
        analysis:'人格底色：深入黑暗守护城市，背负恶名。行动策略：要求部下忠诚，自己承担所有污名。',
        revelation:'你习惯了在阴影中行走，把所有骂名扛在自己肩上。你相信目的的正当性可以洗刷手段的污迹。但偶尔，也有人想为你分担那份孤寂。' },
      { id:'aien', name:'艾恩', title:'铁面医生', quote:'在彼岸诊所，我只做我认为正确的事。', tags:['#医术','#决绝','#彼岸'], region:'dis',
        analysis:'人格底色：为救病人不惜采用极端手段，被主流诟病却从不后悔。行动策略：在彼岸诊所救治狂厄感染者，坚持自己的医道。',
        revelation:'你的手术刀从不犹豫，因为你比任何人都清楚生命的重量。主流的声音无法动摇你，你只对自己的良心负责。这份决绝，是你作为医者的尊严。' },
      { id:'chelsea', name:'切尔西伯爵', title:'宝石女王', quote:'局长，考虑一下被我包养怎么样？', tags:['#富有','#优雅','#自信'], region:'dis',
        analysis:'人格底色：坐拥宝石产业的富家小姐，优雅而自信。行动策略：用财富和魅力让世界按自己的节奏运转。',
        revelation:'你天生就懂得如何让世界围着你转，宝石和你一样耀眼。你的慷慨和自信是与生俱来的天赋。在你眼里，真正珍贵的东西从来不是账户里的数字。' },
      { id:'oak', name:'橡木匣', title:'亡者代言人', quote:'你是比亡灵更有意思的存在。', tags:['#死亡','#信息','#告别'], region:'dis',
        analysis:'人格底色：被抛弃后对世界失望，从死役中获取信息。行动策略：主持告别仪式，渴望辛迪加重生。',
        revelation:'你习惯了与逝者对话，却忘了自己还活着。你收集了太多死亡的信息，但辛迪加的黎明同样值得你期待。偶尔，让生者给你一个拥抱吧。' },
      { id:'hamel', name:'哈梅尔', title:'幻境舞者', quote:'你将我从幻境中唤醒，可是失去舞台的舞者该去往哪里呢。', tags:['#艺术','#牺牲','#幻觉'], region:'dis',
        analysis:'人格底色：为镇压黑环牺牲自由，在幻境中独舞二十三年。行动策略：用舞蹈代替语言，用幻觉掩盖真实。',
        revelation:'你习惯了用舞蹈说话，用幻觉保护自己。但真实的世界里也有人愿意陪你共舞。脱下那件幻象织成的舞裙，你依然是最美的舞者。' },
      { id:'cabernet', name:'卡门奈特', title:'美食品鉴师', quote:'你的灵魂，在它成熟前，我愿意忍受饥饿。', tags:['#欲望','#培养','#优雅'], region:'dis',
        analysis:'人格底色：优雅的掠夺者，将进食升华为病态艺术。行动策略：纵容猎物使其灵魂更美味。',
        revelation:'你的品味无可挑剔，欲望是你创作的动力。但真正的满足或许不在于占有和品尝。克制带来的饥饿感，有时候比饱足更值得回味。' },
      { id:'adela', name:'阿黛拉', title:'雾巷理发师', quote:'呆在局长身边，就是我所期望的日常。', tags:['#记忆','#日常','#剪刀'], region:'dis',
        analysis:'人格底色：为他人剪除烦恼记忆，自己却无法摆脱幻觉。行动策略：不断搬家寻找日常，最终在局长身边找回心跳。',
        revelation:'你习惯了替别人剪去烦恼，却把自己的记忆剪得支离破碎。你一直在寻找一个可以停靠的日常。现在你找到了，不用再搬家了。' },
      { id:'dreya', name:'德雷雅', title:'未知渴求者', quote:'量子场会吸引扭曲时空，而你全都吸引着我。', tags:['#求知','#侵蚀','#沉默'], region:'dis',
        analysis:'人格底色：为真理深入禁地被狂厄完全侵蚀。行动策略：沉默观测，只对局长有反应。',
        revelation:'你对未知的渴望让你坠入了深渊，但你也在深渊里找到了属于自己的黑洞。那个秘密吸引着你，也让你的沉默有了意义。' },
      { id:'raven', name:'渡鸦', title:'自诩诗人', quote:'我用羽毛笔记录着辛迪加的一切。', tags:['#疯癫','#教育','#诗歌'], region:'dis',
        analysis:'人格底色：用夸大事实搅浑辛迪加，逼毒瘤现身。行动策略：写蹩脚诗、办学堂，为流浪儿投入心血。',
        revelation:'你的疯狂是反抗的面具，蹩脚的诗歌里藏着最真挚的愿望。你想让辛迪加的孩子们有书可读，这份温柔比任何诗句都动人。' },
      { id:'deren', name:'黛伦', title:'最佳导演', quote:'你愿意成为我电影中的主角吗？', tags:['#记录','#不认命','#观察'], region:'dis',
        analysis:'人格底色：表面慵懒无所谓，实则看透愚昧。行动策略：暗中记录一切，等待拍摄不认命的故事。',
        revelation:'你曾经把自己的作品交给别人剪辑，失去了想表达的东西。但你还在记录，还在等待。你的镜头里，那些不认命的人就是你重启的理由。' },
      { id:'nox', name:'诺克斯', title:'内海死神', quote:'你让我察觉到许多不熟悉的情绪，我想留在你身边。', tags:['#死神','#残骸','#渴望'], region:'dis',
        analysis:'人格底色：几乎没有生命迹象，凭借转化生命力延续。行动策略：把玩现代物品了解世界，渴望阳光。',
        revelation:'你被称为死神，却比任何人都渴望阳光。你试着了解这个世界，从游戏机到小家电。这份好奇心证明你从未真正死去。' },
      { id:'eirene', name:'伊琳娜', title:'奎恩总裁', quote:'你属于我，我的棋子，我的珍藏。', tags:['#棋局','#掌控','#交易'], region:'dis',
        analysis:'人格底色：将一切视为棋局，享受穷尽智慧的快感。行动策略：用金钱与地位作为筹码，让交易持续。',
        revelation:'你把世界看作棋盘，每一步都计算精妙。但你手中最珍贵的棋子，从来不在棋盘之上。有些东西，不能也不该用输赢来衡量。' },
      { id:'crache', name:'科希', title:'流浪儿领袖', quote:'你为什么没有早点来。', tags:['#阴影','#庇护','#拒绝'], region:'dis',
        analysis:'人格底色：庇护辛迪加边缘孩童，拒绝大人世界。行动策略：藏匿于阴影，只帮助同龄人。',
        revelation:'你不信任大人，因为他们让太多孩子失望过。但你的庇护所里一直缺一个位置。那个人来了，虽然有点晚，但还是来了。' },
      { id:'enfer', name:'恩菲尔', title:'恐惧雕刻家', quote:'我希望看到由内而外迸发的生命，开出名为爱的花。', tags:['#恐惧','#艺术','#依赖'], region:'dis',
        analysis:'人格底色：用恐惧让人显露真实，同时追求恐惧与爱。行动策略：孤傲独行，对局长有特别依赖。',
        revelation:'你用恐惧雕刻真实，却在自己心里埋下了爱的种子。母亲的牺牲让你同时追求这两个主题。在你为局长雕刻的雕像里，恐惧褪去，只剩下温暖。' },
      { id:'serpent', name:'娜恰', title:'蛇之女', quote:'可以给我一个拥抱吗？你的温度让我想起了春天。', tags:['#冷血','#渴望','#伪装'], region:'dis',

        revelation:'你是冷血的蛇，却比任何人都渴望温暖。你用表演取悦观众，心里却只想要一个真诚的拥抱。那个人让你想起了春天。' },
      { id:'summer', name:'夏音', title:'智力天才', quote:'有兴趣做机甲驾驶员吗？', tags:['#天才','#孤独','#机械'], region:'dis',

      { id:'rohu', name:'罗睺', title:'前FAC精锐', quote:'过去我的眼前只有黑暗，可你做的一切就像给这片黑暗打上了一束光。', tags:['#忠诚','#守护','#监视'], region:'dis',

      { id:'coquelic', name:'可可莉克', title:'花园业师', quote:'我希望能沉睡在你这道永不安息的湛蓝色的深渊里。', tags:['#娇贵','#锋利','#花'], region:'dis',

        revelation:'你以娇贵示人，却握着最锋利的剑。你珍惜花园里的每一朵花，希望她们长出划开苦难的枝叶。在你乐意的时候，你比谁都认真。' },
      { id:'donald', name:'唐', title:'前锈火领袖', quote:'会叫我挚友的人已经不在了。', tags:['#乐天','#重建','#挚友'], region:'dis',
        analysis:'人格底色：被背叛的英雄，经历崩溃后依然乐天。行动策略：诱导所有人协助西区重建。',
        revelation:'你经历了那么多，却还是那个爱开玩笑、爱吃炖肉的唐。你的乐观是西区的火焰，烧掉铁锈，照亮前路。新的挚友虽然让你脸红，但你已经准备好了。' },
      { id:'pearl', name:'珀尔夫人', title:'剧院老板娘', quote:'与你在一起的每一刻，似乎都无法预料下一步会通往哪里。', tags:['#享乐','#操盘','#疯狂'], region:'dis',
        analysis:'人格底色：纵情享受的享乐主义者，把爱分给所有人。行动策略：掌控舞台，邀请局长共舞。',
        revelation:'你把爱分给所有人，却从不给任何人全部。这是你的生存之道。但那个人让你想跳一支只属于两个人的舞，火焰吞噬剧院也在所不惜。' },
      { id:'vanilla', name:'瓦尼菈', title:'守望哨兵', quote:'你的到来告诉我，永恒的第一秒，已经过去。', tags:['#守望','#执念','#锚点'], region:'dis',

        revelation:'你独自守着那个前哨站，久到时间都失去了意义。你是永恒中的锚点。那个人的到来让你重新开始计时，永恒终于有了第一秒。' },
      { id:'bianca', name:'毕安卡', title:'正义记者', quote:'采访一下局长，请问你对未来的感情生活有什么规划吗？', tags:['#正义','#亢奋','#追问'], region:'dis',

        revelation:'你拿着摄像机追着真相跑，账户被封了无数次也不在乎。你的八十页采访提纲里，藏着的不只是对新闻的执着。你也想知道那个人心里有没有你的位置。' },
      { id:'hestia', name:'赫斯提亚', title:'盲眼圣女', quote:'都怪你，我连怎么独自生存下去都忘记了。', tags:['#盲眼','#火炬','#依赖'], region:'dis',

        revelation:'你的眼睛看不见，但你的火炬从不会熄灭。你习惯了被丢下，习惯了独自在黑暗中生存。那个人却一次次回来找你，让你忘记了怎么独自活下去。' },
      { id:'pylgia', name:'派尔琪雅', title:'深海女儿', quote:'如果有一天你走到生命的终点，那来见我吧，融于我身。', tags:['#深海','#异类','#循环'], region:'dis',

      { id:'duro', name:'杜若', title:'神话学者', quote:'你给了我真实、信任与归宿，我算是占尽你便宜了。', tags:['#学者','#浪漫','#联结'], region:'dong',

      { id:'yao', name:'曜', title:'金乌', quote:'下次十日再临之时，还请由你持弓。', tags:['#灾厄','#重生','#太阳'], region:'dong',

      { id:'yingying', name:'萦萦', title:'紫藤花仙', quote:'紫藤花听到你的愿望了，你愿意听听我的愿望吗？', tags:['#愿望','#守护','#幻境'], region:'dong',

      { id:'jelena', name:'耶莱娜', title:'贴身管家', quote:'我带着仇恨踏上这片土地，却从未想过还会遇见想要珍惜的人。', tags:['#潜伏','#照料','#爱恨'], region:'dong',

    var prev=document.getElementById('prevBtn'), next=document.getElementById('nextBtn');

    var start=document.getElementById('startTestBtn'), restart=document.getElementById('restartBtn');
    var cName=document.getElementById('charName'), cTitle=document.getElementById('charTitle'), cTags=document.getElementById('traitTags');
    var cQuote=document.getElementById('charQuote'), deep=document.getElementById('deepAnalysis'), rev=document.getElementById('revelation');

    function renderQuestion(i) {
      var q = questions[i]; qDisp.textContent = q.text;
      var html = ''; q.opts.forEach(function(opt, oi) { var sel = ans[i] === oi; html += '<button class="option-btn" data-opt="' + oi + '" style="' + (sel ? 'background:#4a2020;border-color:#d07070;' : '') + '">' + opt.text + '</button>'; });
      optDiv.innerHTML = html;
      optDiv.querySelectorAll('.option-btn').forEach(function(b) { b.addEventListener('click', function(e) {
        var oi = parseInt(b.dataset.opt); ans[i] = oi;
        optDiv.querySelectorAll('.option-btn').forEach(function(bt, ix) { bt.style.background = ix === oi ? '#4a2020' : '#1c0e0ee0'; bt.style.borderColor = ix === oi ? '#d07070' : '#a85050'; });
        updateNav(i);
      }); });
      updateNav(i);
    }

    function updateNav(i) { counter.textContent = (i + 1) + ' / ' + total; prog.style.width = ((i + 1) / total * 100) + '%'; prev.disabled = i === 0; next.textContent = i === total - 1 ? '🔮 揭示烙印' : '下一题 →'; }

    function calcScores() {
      var scores = {}; characters.forEach(function(c) { scores[c.id] = 0; });
      ans.forEach(function(a, i) { if (a !== null) { var sc = questions[i].opts[a].scores; Object.keys(sc).forEach(function(id) { scores[id] = (scores[id] || 0) + sc[id]; }); } });
      return scores;
    }

    function showResult() {
      var scores = calcScores(); var bestChar = characters[0], maxScore = -999;
      characters.forEach(function(c) { if (scores[c.id] > maxScore) { maxScore = scores[c.id]; bestChar = c; } });
      cName.textContent = bestChar.name; cTitle.textContent = bestChar.title; cQuote.textContent = bestChar.quote;
      deep.textContent = bestChar.analysis; rev.textContent = bestChar.revelation;

      quiz.classList.add('hidden'); res.classList.remove('hidden');
    }

      if (ans[idx] === null) { alert('请选择一个选项'); return; }
